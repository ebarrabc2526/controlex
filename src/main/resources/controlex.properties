# Configuracion de Controlex.
# CAMBIA ESTE FICHERO ANTES DE COMPILAR Y DISTRIBUIR EL PLUGIN.
# Los valores quedan empaquetados dentro del JAR, no son editables por el alumnado.

# Contrasena del ZIP de capturas (AES-256). Solo el profesorado debe conocerla.
zip.password=ControlEx-IES-ClaraDelRey-2026

# Frecuencia de captura local: intervalo aleatorio entre cada captura, en SEGUNDOS.
capture.frecuenciaMinSegundos=30
capture.frecuenciaMaxSegundos=120

# Resolucion maxima de la captura (legado). Desde v2.6.2 estos valores YA NO
# se aplican: la calidad/resolucion se controla por contexto desde el panel
# (Calidad → archive/panel/live → Ancho maximo). Mantenemos las claves a 0
# para evitar confusiones si alguien reescribe el fichero.
capture.anchoMaxPx=0
capture.altoMaxPx=0

# --- Servidor de supervision ---
# URL base del servidor (sin barra final).
server.url=https://controlex.ebarrab.com
# Clave de autorizacion que el plugin envia al servidor en cada peticion.
server.apiKey=ControlEx-IES-ClaraDelRey-2026
# Frecuencia de transmision al servidor, en SEGUNDOS (minimo 5).
server.transmitFreqSeconds=30
# Calidad JPEG de las capturas enviadas al servidor (0.1 - 1.0).
server.jpegQuality=0.80
