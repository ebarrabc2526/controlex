<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Controlex — Panel de control</title>
<style>
/* ── Reset ─────────────────────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: #f0f2f5;
  color: #212121;
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ── Toolbar ───────────────────────────────────────────────────────────────── */
.toolbar {
  background: #1565C0;
  color: #fff;
  padding: 0 16px;
  height: 52px;
  display: flex;
  align-items: center;
  gap: 10px;
  flex-shrink: 0;
  box-shadow: 0 2px 8px rgba(0,0,0,.3);
  z-index: 100;
}
.toolbar h1 { font-size: 1.1rem; font-weight: 800; letter-spacing: 3px; white-space: nowrap; }
.tb-count { font-size: 0.78rem; opacity: .75; white-space: nowrap; }
.tb-sep { width: 1px; height: 28px; background: rgba(255,255,255,.25); flex-shrink: 0; }
.spacer { flex: 1; }

/* Mode buttons */
.mode-btn {
  background: rgba(255,255,255,.12);
  border: 1px solid rgba(255,255,255,.35);
  color: #fff;
  padding: 5px 14px;
  border-radius: 5px;
  cursor: pointer;
  font-size: .82rem;
  transition: background .15s;
  white-space: nowrap;
}
.mode-btn:hover  { background: rgba(255,255,255,.22); }
.mode-btn.active { background: rgba(255,255,255,.32); font-weight: 700; }

/* Inline controls */
.ctrl { display: flex; align-items: center; gap: 6px; font-size: .78rem; white-space: nowrap; }
.ctrl label { display: flex; align-items: center; gap: 5px; cursor: pointer; }
.ctrl input[type=range] { width: 90px; cursor: pointer; accent-color: #90CAF9; }
.ctrl select {
  background: rgba(255,255,255,.12);
  border: 1px solid rgba(255,255,255,.35);
  color: #fff;
  border-radius: 4px;
  padding: 3px 6px;
  font-size: .78rem;
  cursor: pointer;
}
.ctrl select option { background: #1565C0; }

.tb-btn {
  background: rgba(255,255,255,.12);
  border: 1px solid rgba(255,255,255,.35);
  color: #fff;
  padding: 5px 11px;
  border-radius: 5px;
  cursor: pointer;
  font-size: .78rem;
  white-space: nowrap;
  transition: background .15s;
}
.tb-btn:hover { background: rgba(255,255,255,.28); }

/* ── Content area ──────────────────────────────────────────────────────────── */
#content { flex: 1; overflow: hidden; display: flex; flex-direction: column; }

/* ── Grid view ─────────────────────────────────────────────────────────────── */
#grid-wrap { flex: 1; overflow-y: auto; padding: 16px; }
#grid-container {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(var(--thumb-size, 240px), 1fr));
  gap: 14px;
}

/* ── Client card ───────────────────────────────────────────────────────────── */
.client-card {
  background: #fff;
  border-radius: 10px;
  box-shadow: 0 1px 5px rgba(0,0,0,.10);
  overflow: hidden;
  display: flex;
  flex-direction: column;
  transition: box-shadow .2s, outline .15s;
}
.client-card:hover { box-shadow: 0 4px 18px rgba(0,0,0,.15); }
.client-card.selected { outline: 3px solid #1565C0; }

.card-header {
  display: flex;
  align-items: center;
  gap: 7px;
  padding: 8px 10px 4px;
}
.card-num  { font-weight: 800; font-size: .88rem; color: #1565C0; min-width: 26px; }
.dot       { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
.dot.on    { background: #43A047; }
.dot.off   { background: #9E9E9E; }
.card-ip   { font-size: .76rem; color: #555; font-family: monospace; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }
.last-seen { font-size: .68rem; color: #aaa; white-space: nowrap; }

.card-thumb { position: relative; background: #111; }
.card-thumb img {
  width: 100%;
  display: block;
  cursor: zoom-in;
  transition: opacity .15s;
}
.card-thumb img:hover { opacity: .9; }
.mosaic-check {
  position: absolute;
  top: 6px; right: 6px;
  width: 18px; height: 18px;
  cursor: pointer;
  accent-color: #1565C0;
}

.card-info {
  padding: 6px 10px;
  font-size: .74rem;
  color: #444;
  line-height: 1.65;
  flex: 1;
  border-top: 1px solid #f0f0f0;
}
.card-info strong { font-weight: 600; color: #222; }

.card-actions {
  display: flex;
  gap: 6px;
  padding: 8px 10px;
  border-top: 1px solid #f0f0f0;
}
.card-btn {
  flex: 1;
  padding: 5px 0;
  border: 1px solid #ddd;
  border-radius: 5px;
  background: #fafafa;
  cursor: pointer;
  font-size: .74rem;
  color: #555;
  transition: all .15s;
}
.card-btn:hover { background: #1565C0; color: #fff; border-color: #1565C0; }

/* ── Mosaic view ───────────────────────────────────────────────────────────── */
#mosaic-wrap { flex: 1; overflow: hidden; padding: 8px; display: none; }
#mosaic-container {
  display: grid;
  grid-template-columns: repeat(var(--mosaic-cols, 2), 1fr);
  grid-auto-rows: 1fr;
  gap: 8px;
  height: 100%;
}
.mosaic-cell {
  position: relative;
  background: #111;
  border-radius: 8px;
  overflow: hidden;
  min-height: 120px;
}
.mosaic-cell img {
  width: 100%;
  height: 100%;
  object-fit: contain;
  display: block;
  cursor: zoom-in;
}
.mosaic-overlay {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  background: linear-gradient(transparent, rgba(0,0,0,.72));
  color: #fff;
  padding: 6px 10px 8px;
  font-size: .74rem;
  line-height: 1.5;
  display: flex;
  align-items: center;
  gap: 6px;
  flex-wrap: wrap;
}
.mo-num { font-weight: 800; font-size: .85rem; }
.mo-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.mo-dot.on  { background: #66BB6A; }
.mo-dot.off { background: #9E9E9E; }

/* ── Empty state ───────────────────────────────────────────────────────────── */
.empty-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 60vh;
  color: #bbb;
  gap: 14px;
  text-align: center;
  line-height: 1.6;
}

/* ── Modals ─────────────────────────────────────────────────────────────────── */
.modal {
  position: fixed; inset: 0;
  background: rgba(0,0,0,.50);
  display: flex; align-items: center; justify-content: center;
  z-index: 1000;
}
.modal-box {
  background: #fff;
  border-radius: 12px;
  padding: 26px 28px;
  width: 440px;
  max-width: 95vw;
  box-shadow: 0 10px 40px rgba(0,0,0,.25);
}
.modal-box h2 { font-size: 1.05rem; margin-bottom: 6px; color: #1565C0; }
.modal-box .sub { font-size: .82rem; color: #777; margin-bottom: 16px; }
.modal-box label {
  display: flex;
  align-items: center;
  justify-content: space-between;
  font-size: .86rem;
  margin-bottom: 10px;
  gap: 12px;
  color: #333;
}
.modal-box input[type=number] {
  border: 1px solid #ccc;
  border-radius: 6px;
  padding: 6px 10px;
  font-size: .88rem;
  width: 110px;
  text-align: right;
}
.modal-box textarea {
  width: 100%;
  border: 1px solid #ccc;
  border-radius: 6px;
  padding: 8px 10px;
  font-size: .9rem;
  margin-bottom: 16px;
  resize: vertical;
  font-family: inherit;
  min-height: 90px;
}
.modal-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 18px; }
.modal-actions button {
  padding: 8px 22px;
  border-radius: 7px;
  cursor: pointer;
  font-size: .88rem;
  border: 1px solid #ccc;
  background: #fff;
  color: #444;
  transition: all .15s;
}
.modal-actions button:hover { border-color: #999; }
.btn-primary { background: #1565C0 !important; color: #fff !important; border-color: #1565C0 !important; }
.btn-primary:hover { background: #1976D2 !important; border-color: #1976D2 !important; }

/* Full-screen modal */
#modal-full { background: rgba(0,0,0,.93); flex-direction: column; gap: 12px; padding: 20px; }
.full-close {
  position: fixed; top: 16px; right: 16px;
  background: rgba(255,255,255,.15);
  color: #fff;
  border: 1px solid rgba(255,255,255,.3);
  border-radius: 50%;
  width: 36px; height: 36px;
  font-size: 1.1rem;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background .15s;
}
.full-close:hover { background: rgba(255,255,255,.28); }
#full-img {
  max-width: 100%;
  max-height: calc(100vh - 100px);
  object-fit: contain;
  border-radius: 4px;
  display: block;
}
#full-info { color: rgba(255,255,255,.8); font-size: .82rem; text-align: center; }

/* Pair coding modal */
#modal-pair .modal-box {
  width: 860px;
  max-width: 98vw;
}
#pair-editor-wrap {
  border: 1px solid #ccc;
  border-radius: 6px;
  min-height: 340px;
  max-height: 60vh;
  overflow: auto;
  font-size: .9rem;
  background: #1e1e1e;
  color: #d4d4d4;
  margin-bottom: 10px;
  position: relative;
}
#pair-status {
  font-size: .78rem;
  color: #888;
  margin-bottom: 8px;
  min-height: 18px;
}
.modal-box input[type=text] {
  border: 1px solid #ccc;
  border-radius: 6px;
  padding: 6px 10px;
  font-size: .88rem;
  width: 100%;
  margin-bottom: 10px;
  box-sizing: border-box;
}
</style>
</head>
<body>

<!-- ── Toolbar ─────────────────────────────────────────────────────────────── -->
<header class="toolbar">
  <h1>CONTROLEX</h1>
  <span class="tb-count" id="tb-count">—</span>

  <div class="tb-sep"></div>

  <button class="mode-btn active" id="btn-grid"   onclick="setView('grid')">⊞ Cuadrícula</button>
  <button class="mode-btn"        id="btn-mosaic" onclick="setView('mosaic')">⊠ Mosaico</button>

  <div class="tb-sep"></div>

  <!-- Grid controls -->
  <div class="ctrl" id="grid-ctrl">
    <label>Tamaño: <input type="range" id="size-slider" min="150" max="580" value="240"
      oninput="setThumbSize(+this.value)"></label>
    <span id="size-label">240 px</span>
  </div>

  <!-- Mosaic controls -->
  <div class="ctrl" id="mosaic-ctrl" style="display:none">
    <label>Columnas:
      <select id="mosaic-cols" onchange="setMosaicCols(this.value)">
        <option value="1">1</option>
        <option value="2" selected>2</option>
        <option value="3">3</option>
        <option value="4">4</option>
        <option value="5">5</option>
        <option value="6">6</option>
        <option value="auto">Auto</option>
      </select>
    </label>
  </div>

  <div class="spacer"></div>

  <button class="tb-btn" onclick="openMsg('*','todos los clientes')">📢 Mensaje a todos</button>
  <button class="tb-btn" onclick="openCfg('*','todos los clientes')">⚙ Config global</button>
  <button class="tb-btn" onclick="pruneOffline()" title="Eliminar clientes offline">🧹 Limpiar offline</button>
  <button class="tb-btn" onclick="wipeAll()" title="Eliminar TODOS los clientes">🗑️ Vaciar todos</button>

  <div class="tb-sep"></div>

  <div class="ctrl">
    <label>Imágenes:
      <select id="refresh-sel" onchange="setImgRefresh(+this.value)">
        <option value="1000">1 s</option>
        <option value="3000" selected>3 s</option>
        <option value="5000">5 s</option>
        <option value="10000">10 s</option>
        <option value="30000">30 s</option>
        <option value="0">Manual</option>
      </select>
    </label>
    <button class="tb-btn" onclick="render()" title="Refrescar imágenes ahora">↺</button>
  </div>
</header>

<!-- ── Content ─────────────────────────────────────────────────────────────── -->
<div id="content">
  <!-- Grid view -->
  <div id="grid-wrap">
    <div id="grid-container" style="--thumb-size:240px"></div>
  </div>

  <!-- Mosaic view -->
  <div id="mosaic-wrap">
    <div id="mosaic-container" style="--mosaic-cols:2"></div>
  </div>
</div>

<!-- ── Message modal ────────────────────────────────────────────────────────── -->
<div id="modal-msg" class="modal" style="display:none">
  <div class="modal-box">
    <h2>📢 Enviar mensaje</h2>
    <p class="sub" id="msg-sub"></p>
    <textarea id="msg-text" placeholder="Escribe el mensaje que verá el alumno…"></textarea>
    <div class="modal-actions">
      <button onclick="closeModal('modal-msg')">Cancelar</button>
      <button class="btn-primary" onclick="sendMsg()">Enviar</button>
    </div>
  </div>
</div>

<!-- ── Config modal ─────────────────────────────────────────────────────────── -->
<div id="modal-cfg" class="modal" style="display:none">
  <div class="modal-box">
    <h2>⚙ Configuración de frecuencias</h2>
    <p class="sub" id="cfg-sub"></p>
    <label>Captura mín. (seg): <input type="number" id="cfg-min" min="1" max="3600" value="30"></label>
    <label>Captura máx. (seg): <input type="number" id="cfg-max" min="1" max="3600" value="120"></label>
    <label>Transmisión (seg):  <input type="number" id="cfg-tx"  min="5" max="3600" value="30"></label>
    <div class="modal-actions">
      <button onclick="closeModal('modal-cfg')">Cancelar</button>
      <button class="btn-primary" onclick="sendCfg()">Aplicar</button>
    </div>
  </div>
</div>

<!-- ── Full-screen modal ─────────────────────────────────────────────────────── -->
<div id="modal-full" class="modal" style="display:none" onclick="closeFull()">
  <button class="full-close" onclick="closeFull()">✕</button>
  <img id="full-img" src="" alt="Captura de pantalla" onclick="event.stopPropagation()">
  <div id="full-info"></div>
</div>

<!-- ── Pair coding modal ──────────────────────────────────────────────────────── -->
<div id="modal-pair" class="modal" style="display:none">
  <div class="modal-box">
    <h2>👥 Pair coding</h2>
    <p class="sub" id="pair-sub"></p>
    <input type="text" id="pair-path" placeholder="Ruta relativa, p. ej. src/Main.java">
    <div id="pair-status">Sin sesión activa.</div>
    <div id="pair-editor-wrap"></div>
    <div class="modal-actions">
      <button onclick="closePair()">Cerrar sesión</button>
      <button class="btn-primary" id="pair-open-btn" onclick="startPairSession()">Abrir sesión</button>
    </div>
  </div>
</div>

<script>
'use strict';

// ── State ─────────────────────────────────────────────────────────────────────
let clients         = [];
let selectedMosaic  = new Set();   // clientIds chosen for mosaic
let currentView     = 'grid';
let thumbSize       = 240;
let mosaicCols      = '2';
let refreshTimer    = null;
let imgRefreshTimer = null;
let eventSource     = null;
let msgTargetId     = null;
let cfgTargetId     = null;

// ── Bootstrap ─────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
    connectStream();
    setImgRefresh(3000);  // refresh thumbnails periodically (independent of state)
});

// ── SSE stream — real-time client state updates ───────────────────────────────
function connectStream() {
    if (eventSource) eventSource.close();
    eventSource = new EventSource('/api/dashboard/stream');

    eventSource.addEventListener('snapshot', e => {
        clients = JSON.parse(e.data);
        updateCount();
        render();
    });

    eventSource.addEventListener('add', e => {
        const c = JSON.parse(e.data);
        const idx = clients.findIndex(x => x.clientId === c.clientId);
        if (idx >= 0) clients[idx] = c;  // safety: avoid duplicates
        else clients.push(c);
        clients.sort((a, b) => a.seqNum - b.seqNum);
        updateCount();
        render();
    });

    eventSource.addEventListener('update', e => {
        const c = JSON.parse(e.data);
        const idx = clients.findIndex(x => x.clientId === c.clientId);
        if (idx >= 0) clients[idx] = c;
        else { clients.push(c); clients.sort((a, b) => a.seqNum - b.seqNum); }
        updateCount();
        render();
        // New screenshot arrived → refresh image immediately (without flicker)
        refreshClientImage(c.clientId);
    });

    const flagOffline = e => {
        const c = JSON.parse(e.data);
        const idx = clients.findIndex(x => x.clientId === c.clientId);
        if (idx >= 0) clients[idx] = c;
        updateCount();
        render();
    };
    eventSource.addEventListener('online',  flagOffline);
    eventSource.addEventListener('offline', flagOffline);

    eventSource.addEventListener('remove', e => {
        const { clientId } = JSON.parse(e.data);
        clients = clients.filter(x => x.clientId !== clientId);
        selectedMosaic.delete(clientId);
        updateCount();
        render();
    });

    eventSource.onerror = () => {
        // Auto-reconnect after 2s if stream drops
        setTimeout(() => { if (eventSource.readyState === EventSource.CLOSED) connectStream(); }, 2000);
    };
}

// Preload an image off-screen, swap visible img.src only when fully loaded.
// This avoids the blank/flash that happens if you assign img.src directly.
function preloadAndSwap(img, url) {
    if (!img) return;
    const pre = new Image();
    pre.onload  = () => { img.src = url; };
    pre.onerror = () => {};  // keep old image on failure
    pre.src = url;
}

// Refresh the screenshot of one specific client everywhere it's shown
// (grid card, mosaic cell, and fullscreen modal if open with that client).
function refreshClientImage(clientId) {
    const url = imgUrl(clientId);
    const sel = CSS.escape(clientId);
    document.querySelectorAll(
        `.client-card[data-id="${sel}"] img, .mosaic-cell[data-id="${sel}"] img`
    ).forEach(img => preloadAndSwap(img, url));

    const fullModal = document.getElementById('modal-full');
    const fullImg   = document.getElementById('full-img');
    if (fullModal && fullModal.style.display !== 'none'
        && fullImg && fullImg.dataset.id === clientId) {
        preloadAndSwap(fullImg, url);
    }
}

// Thumbnails refresh on a timer (the stream handles state, not images)
// Uses preload trick: load new image off-screen, swap src only when ready → no flicker
function setImgRefresh(ms) {
    clearInterval(imgRefreshTimer);
    if (ms > 0) imgRefreshTimer = setInterval(() => {
        const seen = new Set();
        document.querySelectorAll('.client-card[data-id], .mosaic-cell[data-id]').forEach(el => {
            const id = el.dataset.id;
            if (id && !seen.has(id)) { seen.add(id); refreshClientImage(id); }
        });
        const fullImg = document.getElementById('full-img');
        const fullModal = document.getElementById('modal-full');
        if (fullModal && fullModal.style.display !== 'none' && fullImg && fullImg.dataset.id
            && !seen.has(fullImg.dataset.id)) {
            refreshClientImage(fullImg.dataset.id);
        }
    }, ms);
}

// ── View ──────────────────────────────────────────────────────────────────────
function setView(v) {
    currentView = v;
    document.getElementById('btn-grid').classList.toggle('active', v === 'grid');
    document.getElementById('btn-mosaic').classList.toggle('active', v === 'mosaic');
    document.getElementById('grid-ctrl').style.display    = v === 'grid'   ? 'flex'  : 'none';
    document.getElementById('mosaic-ctrl').style.display  = v === 'mosaic' ? 'flex'  : 'none';
    document.getElementById('grid-wrap').style.display    = v === 'grid'   ? 'block' : 'none';
    document.getElementById('mosaic-wrap').style.display  = v === 'mosaic' ? 'block' : 'none';
    render();
}

function setThumbSize(px) {
    thumbSize = px;
    document.getElementById('size-label').textContent = px + ' px';
    document.getElementById('grid-container').style.setProperty('--thumb-size', px + 'px');
}

function setMosaicCols(val) {
    mosaicCols = val;
    const cols = val === 'auto' ? calcAutoCols() : val;
    document.getElementById('mosaic-container').style.setProperty('--mosaic-cols', cols);
    if (currentView === 'mosaic') renderMosaic();
}

function calcAutoCols() {
    const n = selectedMosaic.size || clients.length;
    if (n <= 1) return 1;
    if (n <= 4) return 2;
    if (n <= 9) return 3;
    return 4;
}

async function wipeAll() {
    if (!confirm('¿Eliminar TODOS los clientes del panel (online y offline)?\n\nLos clientes que sigan activos volverán a aparecer en su próxima transmisión.')) return;
    try { await fetch('/api/dashboard/wipe-all', { method: 'POST' }); }
    catch (e) { console.error(e); }
}

async function pruneOffline() {
    if (!confirm('¿Eliminar todos los clientes offline del panel?')) return;
    try {
        const res = await fetch('/api/dashboard/prune-offline', { method: 'POST' });
        const d = await res.json();
        // The 'remove' SSE events will update the UI automatically
        if (d.removed === 0) alert('No hay clientes offline.');
    } catch (e) { console.error(e); }
}

// ── Counter ───────────────────────────────────────────────────────────────────
function updateCount() {
    const on = clients.filter(c => c.online).length;
    document.getElementById('tb-count').textContent =
        `${clients.length} cliente${clients.length !== 1 ? 's' : ''} · ${on} online`;
}

// ── Render ────────────────────────────────────────────────────────────────────
function render() {
    if (currentView === 'grid') renderGrid();
    else renderMosaic();
}

function imgUrl(clientId) {
    return `/api/dashboard/screenshot/${encodeURIComponent(clientId)}?t=${Date.now()}`;
}

// ·· Grid ·····················································
function renderGrid() {
    const gc = document.getElementById('grid-container');
    if (!clients.length) {
        gc.innerHTML = `<div class="empty-state">
            <div style="font-size:3rem">🖥️</div>
            <p>Sin clientes conectados.<br>Los alumnos deben abrir IntelliJ con el plugin activo.</p>
        </div>`;
        return;
    }

    // Clear any empty-state placeholder before rendering cards
    gc.querySelectorAll('.empty-state').forEach(el => el.remove());

    // Reuse existing cards to avoid full DOM rebuild (reduces flicker)
    const existing = new Map([...gc.querySelectorAll('.client-card')].map(el => [el.dataset.id, el]));
    const seen = new Set();
    const frag = document.createDocumentFragment();

    for (const c of clients) {
        seen.add(c.clientId);
        if (existing.has(c.clientId)) {
            updateCard(existing.get(c.clientId), c);
        } else {
            frag.appendChild(buildCard(c));
        }
    }
    for (const [id, el] of existing) if (!seen.has(id)) el.remove();
    if (frag.childNodes.length) gc.appendChild(frag);

    // Maintain sort order
    [...gc.querySelectorAll('.client-card')]
        .sort((a, b) => +a.dataset.seq - +b.dataset.seq)
        .forEach(el => gc.appendChild(el));
}

function buildCard(c) {
    const el = document.createElement('div');
    el.className = 'client-card' + (selectedMosaic.has(c.clientId) ? ' selected' : '');
    el.dataset.id  = c.clientId;
    el.dataset.seq = c.seqNum;
    el.innerHTML   = cardInner(c);
    return el;
}

function updateCard(el, c) {
    el.dataset.seq = c.seqNum;
    el.classList.toggle('selected', selectedMosaic.has(c.clientId));
    el.querySelector('.dot').className  = 'dot ' + (c.online ? 'on' : 'off');
    el.querySelector('.card-ip').textContent = c.ip;
    el.querySelector('.last-seen').textContent = timeAgo(c.lastSeen);
    el.querySelector('.card-info').innerHTML   = infoHTML(c);
    // image is refreshed independently by setImgRefresh — don't touch src here
    const cb = el.querySelector('.mosaic-check');
    if (cb) cb.checked = selectedMosaic.has(c.clientId);
}

function cardInner(c) {
    const sel = selectedMosaic.has(c.clientId);
    return `
<div class="card-header">
  <span class="card-num">#${c.seqNum}</span>
  <span class="dot ${c.online ? 'on' : 'off'}"></span>
  <span class="card-ip">${esc(c.ip)}</span>
  <span class="last-seen">${timeAgo(c.lastSeen)}</span>
</div>
<div class="card-thumb">
  <img src="${imgUrl(c.clientId)}" alt="Captura"
       loading="lazy"
       onclick="openFull('${esc(c.clientId)}')">
  <input class="mosaic-check" type="checkbox" title="Incluir en mosaico"
         ${sel ? 'checked' : ''}
         onchange="toggleMosaic('${esc(c.clientId)}', this.checked)">
</div>
<div class="card-info">${infoHTML(c)}</div>
<div class="card-actions">
  <button class="card-btn"
    onclick="openMsg('${esc(c.clientId)}','#${c.seqNum} ${esc(c.osUser)}')">💬 Mensaje</button>
  <button class="card-btn"
    onclick="openCfg('${esc(c.clientId)}','#${c.seqNum} ${esc(c.osUser)}',${c.captureFreqMin},${c.captureFreqMax},${c.transmitFreqSeconds})">⚙ Config</button>
  <button class="card-btn"
    onclick="openPair('${esc(c.clientId)}','#${c.seqNum} ${esc(c.osUser)}')">👥 Pair</button>
</div>`;
}

function infoHTML(c) {
    return `
<div><strong>Hostname:</strong> ${esc(c.hostname)}</div>
<div><strong>Proyecto:</strong> ${esc(c.projectName)}</div>
<div><strong>IntelliJ:</strong> ${esc(c.intellijUser)}</div>
<div><strong>Sistema:</strong>  ${esc(c.osUser)}</div>
<div><strong>Captura:</strong>  ${c.captureFreqMin}–${c.captureFreqMax} s &nbsp;|&nbsp; <strong>TX:</strong> ${c.transmitFreqSeconds} s</div>`;
}

// ·· Mosaic ···················································
function renderMosaic() {
    const mc   = document.getElementById('mosaic-container');
    const targets = selectedMosaic.size
        ? clients.filter(c => selectedMosaic.has(c.clientId))
        : clients;

    if (!targets.length) {
        mc.innerHTML = `<div class="empty-state">
            <p>Selecciona clientes en la cuadrícula (☑) para incluirlos en el mosaico.<br>
            Si no hay ninguno seleccionado se muestran todos.</p>
        </div>`;
        mc.style.setProperty('--mosaic-cols', 1);
        return;
    }

    // Clear any empty-state placeholder before rendering cells
    mc.querySelectorAll('.empty-state').forEach(el => el.remove());

    const cols = mosaicCols === 'auto' ? calcAutoCols() : mosaicCols;
    mc.style.setProperty('--mosaic-cols', cols);

    const existing = new Map([...mc.querySelectorAll('.mosaic-cell')].map(el => [el.dataset.id, el]));
    const seen = new Set();
    const frag = document.createDocumentFragment();

    for (const c of targets) {
        seen.add(c.clientId);
        if (existing.has(c.clientId)) {
            const cell = existing.get(c.clientId);
            // image refreshed by setImgRefresh — don't touch src here
            cell.querySelector('.mosaic-overlay').innerHTML = mosaicOverlay(c);
        } else {
            frag.appendChild(buildMosaicCell(c));
        }
    }
    for (const [id, el] of existing) if (!seen.has(id)) el.remove();
    if (frag.childNodes.length) mc.appendChild(frag);

    [...mc.querySelectorAll('.mosaic-cell')]
        .sort((a, b) => +a.dataset.seq - +b.dataset.seq)
        .forEach(el => mc.appendChild(el));
}

function buildMosaicCell(c) {
    const el = document.createElement('div');
    el.className  = 'mosaic-cell';
    el.dataset.id  = c.clientId;
    el.dataset.seq = c.seqNum;
    el.innerHTML = `
<img src="${imgUrl(c.clientId)}" alt="Captura" onclick="openFull('${esc(c.clientId)}')">
<div class="mosaic-overlay">${mosaicOverlay(c)}</div>`;
    return el;
}

function mosaicOverlay(c) {
    return `<span class="mo-dot ${c.online ? 'on' : 'off'}"></span>
<span class="mo-num">#${c.seqNum}</span>
<span>${esc(c.ip)}</span>
<span>·</span><span>${esc(c.osUser)}</span>
<span>·</span><span>${esc(c.projectName)}</span>`;
}

// ── Mosaic selection ──────────────────────────────────────────────────────────
function toggleMosaic(clientId, checked) {
    if (checked) selectedMosaic.add(clientId);
    else selectedMosaic.delete(clientId);
    document.querySelectorAll(`.client-card[data-id="${CSS.escape(clientId)}"]`)
        .forEach(el => el.classList.toggle('selected', checked));
    if (currentView === 'mosaic') renderMosaic();
}

// ── Full-screen ───────────────────────────────────────────────────────────────
function openFull(clientId) {
    const c = clients.find(x => x.clientId === clientId);
    if (!c) return;
    const fullImg = document.getElementById('full-img');
    fullImg.dataset.id = clientId;
    fullImg.src = imgUrl(clientId);
    document.getElementById('full-info').textContent =
        `#${c.seqNum}  ·  ${c.ip}  ·  ${c.intellijUser} / ${c.osUser}  ·  ${c.projectName}`;
    document.getElementById('modal-full').style.display = 'flex';
}

function closeFull() {
    document.getElementById('modal-full').style.display = 'none';
    const fullImg = document.getElementById('full-img');
    fullImg.src = '';
    delete fullImg.dataset.id;
}

// ── Message dialog ────────────────────────────────────────────────────────────
function openMsg(clientId, label, _a, _b, _c) {
    msgTargetId = clientId;
    document.getElementById('msg-sub').textContent  = 'Destinatario: ' + label;
    document.getElementById('msg-text').value       = '';
    document.getElementById('modal-msg').style.display = 'flex';
    setTimeout(() => document.getElementById('msg-text').focus(), 60);
}

async function sendMsg() {
    const text = document.getElementById('msg-text').value.trim();
    if (!text) return;
    try {
        await fetch('/api/dashboard/message', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ clientId: msgTargetId, text })
        });
    } catch (e) { console.error(e); }
    closeModal('modal-msg');
}

// ── Config dialog ─────────────────────────────────────────────────────────────
function openCfg(clientId, label, min, max, tx) {
    cfgTargetId = clientId;
    document.getElementById('cfg-sub').textContent = 'Destino: ' + label;
    document.getElementById('cfg-min').value = min  ?? 30;
    document.getElementById('cfg-max').value = max  ?? 120;
    document.getElementById('cfg-tx').value  = tx   ?? 30;
    document.getElementById('modal-cfg').style.display = 'flex';
}

async function sendCfg() {
    try {
        await fetch('/api/dashboard/config', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                clientId:            cfgTargetId,
                captureFreqMin:      +document.getElementById('cfg-min').value,
                captureFreqMax:      +document.getElementById('cfg-max').value,
                transmitFreqSeconds: +document.getElementById('cfg-tx').value
            })
        });
    } catch (e) { console.error(e); }
    closeModal('modal-cfg');
}

// ── Utilities ─────────────────────────────────────────────────────────────────
function closeModal(id) { document.getElementById(id).style.display = 'none'; }

function esc(s) {
    return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function timeAgo(iso) {
    const sec = Math.floor((Date.now() - new Date(iso)) / 1000);
    if (sec < 5)    return 'ahora';
    if (sec < 60)   return `${sec}s`;
    if (sec < 3600) return `${Math.floor(sec/60)}m`;
    return `${Math.floor(sec/3600)}h`;
}

// Close modals on backdrop click / Escape
['modal-msg', 'modal-cfg'].forEach(id => {
    document.getElementById(id).addEventListener('click', function(e) {
        if (e.target === this) closeModal(id);
    });
});
document.addEventListener('keydown', e => {
    if (e.key === 'Escape') { closeModal('modal-msg'); closeModal('modal-cfg'); closeFull(); }
});
</script>

<!-- ── CodeMirror 6 via esm.sh CDN ───────────────────────────────────────────── -->
<script type="module">
'use strict';

import { EditorView, keymap, lineNumbers } from 'https://esm.sh/@codemirror/view@6';
import { EditorState, Transaction } from 'https://esm.sh/@codemirror/state@6';
import { defaultKeymap, history, historyKeymap } from 'https://esm.sh/@codemirror/commands@6';
import { oneDark } from 'https://esm.sh/@codemirror/theme-one-dark@6';
import { StateField, StateEffect, Decoration } from 'https://esm.sh/@codemirror/state@6';
import { WidgetType } from 'https://esm.sh/@codemirror/view@6';

// ── Pair state ────────────────────────────────────────────────────────────────
let pairClientId   = null;
let pairLabel      = null;
let pairWs         = null;
let pairView       = null;
let pairVersion    = 0;
let pairApplying   = false;
let pairCursorTimer = null;

// ── Student caret decoration ──────────────────────────────────────────────────
class StudentCaretWidget extends WidgetType {
    toDOM() {
        const span = document.createElement('span');
        span.style.cssText = 'border-left:2px solid #43A047;margin-left:-1px;height:1em;display:inline-block;vertical-align:text-bottom;';
        span.title = 'Caret del alumno';
        return span;
    }
    eq() { return false; }
    ignoreEvent() { return true; }
}

const setStudentCaret = StateEffect.define();
const studentCaretField = StateField.define({
    create: () => Decoration.none,
    update(deco, tr) {
        deco = deco.map(tr.changes);
        for (const e of tr.effects) {
            if (e.is(setStudentCaret)) {
                const pos = Math.min(e.value, tr.state.doc.length);
                deco = Decoration.set([Decoration.widget({ widget: new StudentCaretWidget(), side: 1 }).range(pos)]);
            }
        }
        return deco;
    },
    provide: f => EditorView.decorations.from(f)
});

// ── Build editor ──────────────────────────────────────────────────────────────
function buildEditor() {
    const wrap = document.getElementById('pair-editor-wrap');
    wrap.innerHTML = '';

    const updateListener = EditorView.updateListener.of(update => {
        if (!update.docChanged) return;
        for (const tr of update.transactions) {
            if (tr.annotation(Transaction.remote)) continue;
            if (!pairWs || pairWs.readyState !== WebSocket.OPEN) continue;
            const ops = [];
            tr.changes.iterChanges((fromA, toA, fromB, toB, inserted) => {
                if (toA > fromA) ops.push({ opType: 'delete', offset: fromA, len: toA - fromA });
                if (inserted.length > 0) ops.push({ opType: 'insert', offset: fromB, text: inserted.toString() });
            });
            if (ops.length) {
                pairWs.send(JSON.stringify({ type: 'edit', baseVersion: pairVersion, ops }));
            }
        }
    });

    const caretListener = EditorView.updateListener.of(update => {
        if (!update.selectionSet) return;
        if (!pairWs || pairWs.readyState !== WebSocket.OPEN) return;
        clearTimeout(pairCursorTimer);
        pairCursorTimer = setTimeout(() => {
            const offset = update.state.selection.main.head;
            pairWs.send(JSON.stringify({ type: 'cursor', offset }));
        }, 30);
    });

    pairView = new EditorView({
        state: EditorState.create({
            doc: '',
            extensions: [
                history(),
                keymap.of([...defaultKeymap, ...historyKeymap]),
                lineNumbers(),
                oneDark,
                studentCaretField,
                updateListener,
                caretListener
            ]
        }),
        parent: wrap
    });
}

// ── Apply remote ops ──────────────────────────────────────────────────────────
function applyRemoteOps(ops, newVersion) {
    if (!pairView) return;
    pairApplying = true;
    try {
        const changes = [];
        for (const op of ops) {
            if (op.opType === 'insert') {
                changes.push({ from: op.offset, insert: op.text });
            } else if (op.opType === 'delete') {
                changes.push({ from: op.offset, to: op.offset + op.len });
            }
        }
        if (changes.length) {
            pairView.dispatch({
                changes,
                annotations: [Transaction.remote.of(true)]
            });
        }
        pairVersion = newVersion;
    } finally {
        pairApplying = false;
    }
}

// ── WS connect ────────────────────────────────────────────────────────────────
function connectPairWs(token) {
    const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
    const url = `${proto}//${location.host}/api/dashboard/pair?token=${encodeURIComponent(token)}`;
    pairWs = new WebSocket(url);

    pairWs.onopen = () => setStatus('Conectado. Esperando estado del documento…');

    pairWs.onmessage = e => {
        let msg;
        try { msg = JSON.parse(e.data); } catch { return; }

        if (msg.type === 'doc-state') {
            pairVersion = msg.version || 0;
            if (pairView) {
                pairView.dispatch({
                    changes: { from: 0, to: pairView.state.doc.length, insert: msg.content || '' },
                    annotations: [Transaction.remote.of(true)]
                });
            }
            setStatus(`Sesión activa — versión ${pairVersion}`);
        } else if (msg.type === 'edit') {
            applyRemoteOps(msg.ops || [], msg.version || pairVersion);
            setStatus(`Sesión activa — versión ${pairVersion}`);
        } else if (msg.type === 'cursor' && msg.who === 'student') {
            if (pairView) {
                pairView.dispatch({ effects: [setStudentCaret.of(Number(msg.offset) || 0)] });
            }
        }
    };

    pairWs.onerror = () => setStatus('Error en la conexión WebSocket.');
    pairWs.onclose = () => setStatus('Sesión cerrada.');
}

// ── Public API (called from non-module script) ────────────────────────────────
function setStatus(msg) {
    const el = document.getElementById('pair-status');
    if (el) el.textContent = msg;
}

window.openPair = function(clientId, label) {
    pairClientId = clientId;
    pairLabel    = label;
    document.getElementById('pair-sub').textContent  = 'Alumno: ' + label;
    document.getElementById('pair-path').value       = '';
    document.getElementById('modal-pair').style.display = 'flex';
    setStatus('Sin sesión activa.');
    buildEditor();
};

window.startPairSession = async function() {
    const filePath = document.getElementById('pair-path').value.trim();
    if (!filePath) { alert('Introduce la ruta relativa del fichero.'); return; }
    if (pairWs) { pairWs.close(); pairWs = null; }

    setStatus('Abriendo sesión…');
    try {
        const resp = await fetch('/api/dashboard/pair-open', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ clientId: pairClientId, path: filePath })
        });
        if (!resp.ok) { setStatus('Error al abrir sesión: ' + resp.status); return; }
        const { token } = await resp.json();
        connectPairWs(token);
    } catch (err) {
        setStatus('Error de red: ' + err.message);
    }
};

window.closePair = async function() {
    const filePath = document.getElementById('pair-path').value.trim();
    if (pairWs) { pairWs.close(); pairWs = null; }
    if (pairClientId && filePath) {
        try {
            await fetch('/api/dashboard/pair-close', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ clientId: pairClientId, path: filePath })
            });
        } catch (_) {}
    }
    document.getElementById('modal-pair').style.display = 'none';
    if (pairView) { pairView.destroy(); pairView = null; }
    pairClientId = null;
    pairVersion  = 0;
};

// Close on backdrop click
document.getElementById('modal-pair').addEventListener('click', function(e) {
    if (e.target === this) window.closePair();
});
</script>
